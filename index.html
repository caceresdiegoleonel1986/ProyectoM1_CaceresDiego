<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Paletas</title>
  <link rel="stylesheet" href="style/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header>
    <img src="assets/img/logo.png" alt="Logo del Generador de Paletas" width="100" height="100">
    <h1 class="logo">Colorfly Studio</h1>
    <h2>Generador de Paletas</h2>
  </header>

  <main class="main-content"><!-- Controles para generar paletas -->
    <section class="controls">
    <!-- Label asociado con select -->
     <button id="generate-btn" type="button" aria-label="Generar nueva paleta">Generar paleta</button>
     <label for="palette-size">Tamaño de paleta:</label>
     <select id="palette-size" name="palette-size">
       <option value="6">6 colores</option>
       <option value="8">8 colores</option>
       <option value="9">9 colores</option>
     </select>

    <!-- Label asociado con select -->
     <label for="format">Formato:</label>
     <select id="format" name="format">
       <option value="hsl">HSL</option>
       <option value="rgba">RGBA</option>
     </select>

      <!-- Botones con aria-label para accesibilidad -->
      <button id="save-btn" type="button" aria-label="Guardar paleta actual">Guardar paleta</button>
    </section>

    <!-- Paleta generada -->
    <section id="palette" aria-label="Paleta de colores"></section>

        <!-- Paletas guardadas -->
    <section id="saved-palettes" aria-label="Paletas guardadas">
      <h3>Paletas guardadas</h3>
      <button id="clear-saved-btn" type="button" aria-label="Limpiar paletas guardadas">Limpiar paletas guardadas</button>
      <div id="toast-confirm" class="toast"></div>
      <div id="palettes-list"></div>
    </section>
  </main>

  <!-- Mensaje de estado accesible -->
  <div id="toast" class="toast toast-copy" role="status" aria-live="polite">Código HEX copiado ✔</div>

  <footer>
    <p>
      <span class="social-icons">
       <a href="https://github.com/caceresdiegoleonel1986" target="_blank"><i class="fa-brands fa-github"></i></a>
       <a href="https://www.linkedin.com/in/diego-leonel-caceres/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
      </span>
      Creado por Diego Caceres -
      <a href="mailto:caceresdiegoleonel@gmail.com">caceresdiegoleonel@gmail.com</a>
    </p>
  </footer>

  <script src="script/script.js" defer></script>
</body>
</html>
